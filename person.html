<!DOCTYPE html>
<html>
<head>
    <title>Mother's Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
            color: black; /* TEXT IS NOW BLACK */
            animation: fadeIn 2s;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 55px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px black; }
            to { text-shadow: 0 0 25px black; }
        }

        .message {
            font-size: 26px;
            margin-top: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
            animation: fadeIn 3s;
        }

        .btn {
            margin-top: 40px;
            padding: 12px 20px;
            font-size: 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid black;
            cursor: pointer;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 8px solid rgba(0,0,0,0.5);
            box-sizing: border-box;
            animation: borderGlow 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes borderGlow {
            from { box-shadow: 0 0 10px black; }
            to { box-shadow: 0 0 30px black; }
        }

        .heart {
            position: absolute;
            color: rgba(0, 0, 0, 0.7);
            font-size: 25px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

<h1 id="title"></h1>
<div class="message" id="message"></div>

<button class="btn" onclick="window.location.href='card.html'">Open Card</button>
<button class="btn" onclick="window.location.href='index.html'">Back</button>
<button class="btn" onclick="window.location.href='intro.html'">Restart Experience</button>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

const data = {
    jaime: {
        photos: [
            "https://images.unsplash.com/photo-1501973801540-537f08ccae7b", /* SUNSET */
            "https://images.unsplash.com/photo-1501973801540-537f08ccae7b",
            "https://images.unsplash.com/photo-1501973801540-537f08ccae7b"
        ],
        message: "Thanks for always being there for me through all the hard and all the easy times of my life. I really couldn't survive without you. I love you so much! Have a great Mother's Day."
    },
    caryn: {
        photos: [
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e", /* KEEP BEACH */
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
        ],
        message: "You are always that cool aunt that I couldn't ask for better. You're always there for me when I need you and you make the best food dishes. I love you so much! Have a great Mother's Day!"
    },
    rebeka: {
        photos: [
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?newBeach", /* NEW BEACH */
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?newBeach2",
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?newBeach3"
        ],
        message: "We always bond over the best stuff and I really enjoy every minute with you. I love all the support you give me for my sports and academic life. You really know how to help people in their ups and downs of life. I love you so much! Have a great Mother's Day!"
    },
    janet: {
        photos: [
            "https://images.unsplash.com/photo-1501785888041-af3ef285b470", /* SCENIC MOUNTAINS */
            "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
            "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
        ],
        message: "Happy Mother's Day grandma, you're so amazing to hang out with. You tell me such funny stories about dad when he was younger and you always give me the best snacks when I come over. I wish I could see you more often. I love you so much! Have a great Mother's Day!"
    }
};

const person = data[name];

document.getElementById("title").innerText = name.charAt(0).toUpperCase() + name.slice(1);
document.getElementById("message").innerText = person.message;

let index = 0;
function changeBackground() {
    document.body.style.backgroundImage = `url('${person.photos[index]}')`;
    index = (index + 1) % person.photos.length;
}
changeBackground();
setInterval(changeBackground, 5000);

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>
