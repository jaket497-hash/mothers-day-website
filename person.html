<!DOCTYPE html>
<html>
<head>
    <title>Mother's Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
            color: white;
            animation: fadeIn 2s;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 55px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 25px white; }
        }

        .message {
            font-size: 26px;
            margin-top: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
            animation: fadeIn 3s;
        }

        .items {
            font-size: 26px;
            margin-top: 25px;
            animation: fadeIn 4s;
        }

        .btn {
            margin-top: 40px;
            padding: 12px 20px;
            font-size: 20px;
            background: white;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 8px solid rgba(255,255,255,0.7);
            box-sizing: border-box;
            animation: borderGlow 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes borderGlow {
            from { box-shadow: 0 0 10px white; }
            to { box-shadow: 0 0 30px white; }
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 25px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

<h1 id="title"></h1>
<div class="message" id="message"></div>
<div class="items" id="items"></div>

<button class="btn" onclick="window.location.href='card.html'">Open Card</button>
<button class="btn" onclick="window.location.href='index.html'">Back</button>
