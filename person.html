<!DOCTYPE html>
<html>
<head>
    <title>Mother's Day</title>

    <!-- Elegant font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            color: black;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            font-size: 55px;
            margin-bottom: 20px;
            text-shadow: 0 0 12px rgba(0,0,0,0.4);
        }

        .message-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 25px;
            border-radius: 15px;
            max-width: 800px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .message {
            font-size: 26px;
            line-height: 1.5;
        }

        .btn {
            padding: 12px 20px;
            font-size: 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid black;
            cursor: pointer;
            margin: 10px;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 8px solid rgba(0,0,0,0.5);
            box-sizing: border-box;
            animation: borderGlow 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes borderGlow {
            from { box-shadow: 0 0 10px black; }
            to { box-shadow: 0 0 30px black; }
        }

        .heart {
            position: absolute;
            color: rgba(0, 0, 0, 0.7);
            font-size: 25px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

<h1 id="title"></h1>

<div class="message-box">
    <div class="message" id="message"></div>
</div>

<div>
    <button class="btn" onclick="window.location.href='card.html'">Open Card</button>
    <button class="btn" onclick="window.location.href='index.html'">Back</button>
    <button class="btn" onclick="window.location.href='intro.html'">Restart</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

const data = {
    jaime: {
        photo: "https://images.unsplash.com/photo-1501004318641-b39e6451bec6?lilac_field", 
        message: "Thanks for always being there for me through all the hard and all the easy times of my life. I really couldn't survive without you. I love you so much! Have a great Mother's Day."
    },
    caryn: {
        photo: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?caribbean_sea",
        message: "You are always that cool aunt that I couldn't ask for better. You're always there for me when I need you and you make the best food dishes. I love you so much! Have a great Mother's Day!"
    },
    rebeka: {
        photo: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?differentBeach",
        message: "We always bond over the best stuff and I really enjoy every minute with you. I love all the support you give me for my sports and academic life. You really know how to help people in their ups and downs of life. I love you so much! Have a great Mother's Day!"
    },
    janet: {
        photo: "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
        message: "Happy Mother's Day grandma, you're so amazing to hang out with. You tell me such funny stories about dad when he was younger and you always give me the best snacks when I come over. I wish I could see you more often. I love you so much! Have a great Mother's Day!"
    }
};

const person = data[name];

// Set background
document.body.style.backgroundImage = `url('${person.photo}')`;

// Set text
document.getElementById("title").innerText = name.charAt(0).toUpperCase() + name.slice(1);
document.getElementById("message").innerText = person.message;

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>
