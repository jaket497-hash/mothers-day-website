<!DOCTYPE html>
<html>
<head>
    <title>Your Card</title>
    <style>
        body {
            margin: 0;
            background: #ffe6f2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        .card {
            width: 300px;
            height: 200px;
            background: white;
            border-radius: 10px;
            position: relative;
            transform-style: preserve-3d;
            animation: openCard 3s forwards;
        }

        .front, .inside {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
        }

        .front {
            background: pink;
        }

        .inside {
            background: white;
            transform: rotateY(180deg);
        }

        @keyframes openCard {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }

        .restart {
            margin-top: 40px;
            padding: 15px 25px;
            font-size: 22px;
            background: white;
            color: hotpink;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .restart:hover {
            background: #ffd6e8;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="front">💌 Tap to Open</div>
    <div class="inside">Happy Mother's Day!</div>
</div>

<button class="restart" onclick="window.location.href='intro.html'">Restart Experience</button>

<script>
setTimeout(() => {
    window.location.href = "ending.html";
}, 4000);
</script>

</body>
</html>
