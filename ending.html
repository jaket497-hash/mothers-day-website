<!DOCTYPE html>
<html>
<head>
    <title>We Love You</title>
    <style>
        body {
            margin: 0;
            background: pink;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        h1 {
            font-size: 60px;
            animation: pop 2s infinite alternate;
        }

        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .heart {
            position: absolute;
            color: white;
            font-size: 25px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        .restart {
            margin-top: 40px;
            padding: 15px 25px;
            font-size: 22px;
            background: white;
            color: hotpink;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .restart:hover {
            background: #ffe6f2;
        }
    </style>
</head>
<body>

<h1>We Love You ❤️</h1>

<button class="restart" onclick="window.location.href='intro.html'">Restart Experience</button>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
